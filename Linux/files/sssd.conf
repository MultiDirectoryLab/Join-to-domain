[sssd]
    config_file_version = 2
    domains = __DOMAIN__
    services = nss, pam, ssh

[domain/__DOMAIN__]
    ldap_schema = rfc2307bis
    ldap_group_nesting_level = 1000

    ldap_default_bind_dn = __SSSD_BIND_DN__
    ldap_default_authtok = __SSSD_PASSWORD__
    ldap_default_authtok_type = obfuscated_password

    id_provider = ldap
    ldap_uri = __URI__
    ldap_search_base = __LDAP_SEARCH_BASE__

    auth_provider = krb5
    krb5_server = __KDC__
    krb5_kpasswd = __KDC__
    krb5_realm = __REALM__

    cache_credentials = False
    ldap_id_use_start_tls = False

    ldap_group_search_base = __LDAP_GROUP_BASE__
    ldap_user_search_base = __LDAP_USER_BASE__

    access_provider = permit
    sudo_provider = ldap
    chpass_provider = krb5
    autofs_provider = ldap
    resolver_provider = ldap

    use_fully_qualified_names = False
    fallback_homedir = /home/%u@%d
    default_shell = /bin/bash
